services:
  web:
    image: azerty78/kobecorporation-web:latest
    container_name: kobecorporation-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

