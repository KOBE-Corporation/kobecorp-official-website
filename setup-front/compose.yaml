services:
  web:
    image: azerty78/kobecorporation-web:latest
    container_name: kobecorporation-web
    restart: unless-stopped
    # Pas de ports publiés sur l'hôte : blogpress-nginx proxifie via le réseau Docker
    # (upstream kobecorporation-web:80). Le bind 127.0.0.1:4000 est optionnel pour debug.
    expose:
      - "80"
    ports:
      - "127.0.0.1:4000:80"
    environment:
      - NODE_ENV=production
    networks:
      - kobecorp-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  kobecorp-network:
    name: kobecorp-network
    external: true
