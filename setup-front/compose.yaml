# Projet Compose unique — évite le conflit avec ben-djibril
# (les deux dossiers s'appellent setup-front → même nom de projet par défaut)
name: kobecorp-web

services:
  web:
    image: azerty78/kobecorporation-web:latest
    container_name: kobecorporation-web
    restart: unless-stopped
    # blogpress-nginx proxifie vers kobecorporation-web:80 sur kobecorp-network
    expose:
      - "80"
    ports:
      - "127.0.0.1:4000:80"
    environment:
      - NODE_ENV=production
    networks:
      - kobecorp-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  kobecorp-network:
    name: kobecorp-network
    external: true
