name: 🚀 KOBE Corporation CI/CD

# ==========================================
# DÉCLENCHEMENT
# ==========================================
# Ce workflow se déclenche :
# - Automatiquement sur push vers main ou master
# - Automatiquement sur pull_request vers main ou master
# - Manuellement depuis l'onglet Actions (workflow_dispatch)
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Permet de déclencher manuellement depuis GitHub

# ==========================================
# PERMISSIONS
# ==========================================
permissions:
  contents: write  # Nécessaire pour créer des releases et pousser des tags
  packages: write  # Nécessaire pour pousser des images Docker (si utilisé)

# ==========================================
# VARIABLES GLOBALES
# ==========================================
env:
  DOCKER_IMAGE: azerty78/kobecorporation-web
  DOCKERFILE_PATH: setup-front/Dockerfile
  DOCKER_CONTEXT: .

# ==========================================
# JOBS
# ==========================================
jobs:
  # ==========================================
  # JOB 1: Create Git Tags
  # ==========================================
  tags:
    name: 🏷️ Create Git Tags
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_created: ${{ steps.finalize.outputs.created }}
      tag_name: ${{ steps.finalize.outputs.name }}
      tag_type: ${{ steps.finalize.outputs.type }}
      is_release: ${{ steps.finalize.outputs.is_release }}
      semantic_version: ${{ steps.finalize.outputs.semantic_version }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ⚙️ Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: 📋 Extract Version & Info
        id: version
        run: |
          echo "✅ Informations sur les tags Git"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📌 Ref: ${{ github.ref }}"
          echo "🔖 SHA: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "👤 Auteur: $(git log -1 --pretty=%an)"
          echo "📅 Date: $(git log -1 --pretty=%cd --date=format:%Y-%m-%d\ %H:%M:%S)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Lire la version depuis package.json (méthode bash pure)
          if [ -f "package.json" ]; then
            # Extraire la version avec grep et sed (méthode simple et fiable)
            PACKAGE_VERSION=$(grep -m 1 '"version"' package.json | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
            if [ -z "$PACKAGE_VERSION" ]; then
              PACKAGE_VERSION="0.0.0"
            fi
            echo "📦 Version package.json: $PACKAGE_VERSION"
            echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          else
            echo "⚠️ package.json non trouvé, utilisation de la version par défaut"
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          fi
          
          # Afficher les 10 derniers tags
          echo ""
          echo "📋 Tags existants (10 derniers):"
          git tag -l --sort=-version:refname | head -10 || echo "  Aucun tag trouvé"
          
          # Afficher les informations du commit
          echo ""
          echo "📝 Dernier commit:"
          echo "  SHA: $(git log -1 --pretty=%H)"
          COMMIT_MSG_FIRST_LINE=$(git log -1 --pretty=%B | head -n 1)
          echo "  Message: $COMMIT_MSG_FIRST_LINE"
          echo "  Auteur: $(git log -1 --pretty='%an <%ae>')"
      
      - name: 📊 Analyze Changes
        id: changes
        run: |
          echo "📊 Analyse des changements:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Compter les fichiers modifiés
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            FILES_CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | wc -l)
            echo "📁 Fichiers modifiés: $FILES_CHANGED"
            
            # Afficher les types de changements
            echo ""
            echo "📝 Types de changements:"
            git diff --name-status ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | \
              awk '{print "  " $1 " " $2}' | head -20 || echo "  Aucun changement détecté"
          else
            # Pour les pushes, comparer avec le commit précédent
            PREV_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
            if [ -n "$PREV_SHA" ]; then
              FILES_CHANGED=$(git diff --name-only $PREV_SHA ${{ github.sha }} | wc -l)
              echo "📁 Fichiers modifiés: $FILES_CHANGED"
              
              echo ""
              echo "📝 Types de changements:"
              git diff --name-status $PREV_SHA ${{ github.sha }} | \
                awk '{print "  " $1 " " $2}' | head -20 || echo "  Aucun changement détecté"
            else
              echo "ℹ️ Premier commit de la branche"
            fi
          fi
          
          # Détecter le type de changement (feat, fix, etc.)
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qiE "^(feat|feature)"; then
            CHANGE_TYPE="✨ Feature"
          elif echo "$COMMIT_MSG" | grep -qiE "^(fix|bugfix)"; then
            CHANGE_TYPE="🐛 Fix"
          elif echo "$COMMIT_MSG" | grep -qiE "^(refactor)"; then
            CHANGE_TYPE="♻️ Refactor"
          elif echo "$COMMIT_MSG" | grep -qiE "^(docs|documentation)"; then
            CHANGE_TYPE="📚 Documentation"
          elif echo "$COMMIT_MSG" | grep -qiE "^(test)"; then
            CHANGE_TYPE="🧪 Test"
          elif echo "$COMMIT_MSG" | grep -qiE "^(chore)"; then
            CHANGE_TYPE="🔧 Chore"
          else
            CHANGE_TYPE="📝 Update"
          fi
          
          echo ""
          echo "🏷️ Type de changement détecté: $CHANGE_TYPE"
          echo "change_type=$CHANGE_TYPE" >> $GITHUB_OUTPUT
      
      - name: 🏷️ Create Git Tag
        id: tag
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          DATE=$(git log -1 --pretty=%cd --date=format:%Y-%m-%d\ %H:%M:%S)
          SHORT_SHA=$(echo $SHA | cut -c1-7)
          
          # Détecter le type de changement pour déterminer le type de tag
          CHANGE_TYPE="${{ steps.changes.outputs.change_type }}"
          
          # Si la version est 0.0.0, créer un tag de développement
          # Sinon, créer un tag sémantique (v1.0.0, v1.1.0, etc.)
          if [ "$VERSION" = "0.0.0" ]; then
            # Tag de développement avec SHA et timestamp
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            TAG_NAME="dev-${SHORT_SHA}-${TIMESTAMP}"
            TAG_TYPE="development"
            echo "🔧 Création d'un tag de développement: $TAG_NAME"
          else
            # Tag sémantique basé sur la version (v1.0.0, v1.1.0, etc.)
            TAG_NAME="v${VERSION}"
            TAG_TYPE="semantic"
            
            # Vérifier si le tag sémantique existe déjà
            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "⚠️ Le tag sémantique $TAG_NAME existe déjà"
              echo "ℹ️ Utilisation d'un tag de développement à la place"
              TIMESTAMP=$(date +%Y%m%d%H%M%S)
              TAG_NAME="dev-${SHORT_SHA}-${TIMESTAMP}"
              TAG_TYPE="development"
            else
              echo "🎉 Création d'un tag sémantique: $TAG_NAME"
            fi
          fi
          
          # Créer le message du tag enrichi (format simplifié pour éviter les problèmes YAML)
          TAG_MESSAGE="Release $TAG_NAME - Version: $VERSION - Commit: $SHA - Branch: $BRANCH - Auteur: $AUTHOR - Date: $DATE - Type: $TAG_TYPE - Changement: $CHANGE_TYPE - Message: $COMMIT_MSG - Généré automatiquement par GitHub Actions"
          
          # Créer le tag annoté
          git tag -a "$TAG_NAME" -m "$TAG_MESSAGE" "$SHA"
          
          echo "✅ Tag créé: $TAG_NAME"
          echo "name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "created=true" >> $GITHUB_OUTPUT
          echo "type=$TAG_TYPE" >> $GITHUB_OUTPUT
          
          # Détecter si c'est une release sémantique (version != 0.0.0 et tag sémantique)
          if [ "$VERSION" != "0.0.0" ] && [ "$TAG_TYPE" = "semantic" ]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "semantic_version=$VERSION" >> $GITHUB_OUTPUT
            echo "🎉 Release sémantique détectée (version: $VERSION)"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "semantic_version=" >> $GITHUB_OUTPUT
          fi
      
      - name: 📋 Finalize Tag Outputs
        id: finalize
        if: always()
        run: |
          # Si le tag n'a pas été créé, utiliser les valeurs par défaut
          if [ "${{ steps.tag.outputs.created }}" != "true" ]; then
            echo "ℹ️ Aucun tag créé (PR ou branche non principale)"
            echo "name=" >> $GITHUB_OUTPUT
            echo "created=false" >> $GITHUB_OUTPUT
            echo "type=" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "semantic_version=" >> $GITHUB_OUTPUT
          else
            # Utiliser les valeurs du step tag
            echo "name=${{ steps.tag.outputs.name }}" >> $GITHUB_OUTPUT
            echo "created=${{ steps.tag.outputs.created }}" >> $GITHUB_OUTPUT
            echo "type=${{ steps.tag.outputs.type }}" >> $GITHUB_OUTPUT
            echo "is_release=${{ steps.tag.outputs.is_release }}" >> $GITHUB_OUTPUT
            echo "semantic_version=${{ steps.tag.outputs.semantic_version }}" >> $GITHUB_OUTPUT
          fi
      
      - name: 🚀 Push Tags
        if: steps.tag.outputs.created == 'true'
        run: |
          TAG_NAME="${{ steps.tag.outputs.name }}"
          echo "🚀 Push du tag $TAG_NAME vers le dépôt..."
          git push origin "$TAG_NAME" || {
            echo "⚠️ Erreur lors du push du tag, peut-être qu'il existe déjà sur le serveur"
            exit 0  # Ne pas faire échouer le workflow si le tag existe déjà
          }
          echo "✅ Tag $TAG_NAME poussé avec succès"
      
      - name: 📋 Summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 RÉSUMÉ DU JOB TAGS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Version: ${{ steps.version.outputs.version }}"
          if [ "${{ steps.tag.outputs.created }}" == "true" ]; then
            echo "✅ Tag créé: ${{ steps.tag.outputs.name }}"
            echo "🏷️  Type de tag: ${{ steps.tag.outputs.type }}"
            if [ "${{ steps.tag.outputs.is_release }}" == "true" ]; then
              echo "🎉 Release sémantique: ${{ steps.tag.outputs.semantic_version }}"
              echo "📦 L'image Docker sera taggée avec: ${{ steps.tag.outputs.tag_name }}"
              echo "🚀 Une release GitHub sera créée automatiquement"
            else
              echo "🔧 Tag de développement créé"
            fi
          else
            echo "ℹ️ Aucun tag créé (PR ou branche non principale)"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  
  # ==========================================
  # JOB 2: Build Docker Image
  # ==========================================
  build:
    needs: tags
    name: 🔨 Build & Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      # Étape 1: Checkout du code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # Étape 2: Nettoyer et recréer les contextes Docker correctement
      - name: 🧹 Setup Docker Properly
        run: |
          # Supprimer buildx et contextes corrompus
          rm -rf ~/.docker/buildx 2>/dev/null || true
          rm -rf ~/.docker/contexts 2>/dev/null || true
          
          # Recréer buildx/activity comme FICHIER avec un timestamp valide
          # (buildx attend un RFC3339 dans ce fichier, pas un fichier vide ni un dossier)
          mkdir -p ~/.docker/buildx
          printf '%s' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > ~/.docker/buildx/activity
          
          # Recréer la structure de contextes correctement
          mkdir -p ~/.docker/contexts/meta
          
          # Créer le répertoire pour le contexte "." (hash de l'erreur)
          CONTEXT_DIR=~/.docker/contexts/meta/cdb4ee2aea69cc6a83331bbe96dc2caa9a299d21329efb0336fc02a82e1839a8
          mkdir -p "$CONTEXT_DIR"
          
          # Créer le fichier meta.json pour le contexte "."
          cat > "$CONTEXT_DIR/meta.json" <<'EOF'
          {
            "Name": ".",
            "Metadata": {
              "Description": "Default context"
            },
            "Endpoints": {
              "docker": {
                "Host": "unix:///var/run/docker.sock",
                "SkipTLSVerify": false
              }
            }
          }
          EOF
          
          # Vérifier que le fichier a été créé
          if [ -f "$CONTEXT_DIR/meta.json" ]; then
            echo "✅ Contexte Docker '.' créé avec succès"
          else
            echo "❌ Erreur: Impossible de créer le contexte"
            exit 1
          fi
      
      # Étape 3: Login à DockerHub (TOUJOURS nécessaire pour pull les images de base)
      - name: 🔐 Login to DockerHub
        run: |
          # Utiliser docker login directement (le contexte "." existe maintenant)
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Vérifier le login en testant un pull d'image publique
          echo "✅ Login DockerHub réussi"
          
          # Test: essayer de pull node:22.13.1-alpine pour vérifier l'authentification
          echo "Test: Pull de node:22.13.1-alpine..."
          docker pull node:22.13.1-alpine || {
            echo "❌ Erreur: Impossible de pull node:22.13.1-alpine"
            echo "Vérification du config.json..."
            cat ~/.docker/config.json || echo "⚠️ Pas de config.json"
            exit 1
          }
          echo "✅ Pull de node:22.13.1-alpine réussi"
      
      # Étape 4: Extract metadata (tags, labels) avec intégration des tags Git
      - name: 📋 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            # Tags Git (prioritaires si disponibles)
            type=raw,value=${{ needs.tags.outputs.tag_name }},enable=${{ needs.tags.outputs.tag_created == 'true' && needs.tags.outputs.tag_name != '' }}
            # Tags sémantiques basés sur la version
            type=semver,pattern={{version}},enable=${{ needs.tags.outputs.is_release == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.tags.outputs.is_release == 'true' }}
            # Tags de branche (fallback)
            type=ref,event=branch
            # Tag SHA avec préfixe de branche (fallback) - s'assurer que le préfixe est valide
            type=sha,prefix=${{ github.ref_name }}-
            # Tag latest uniquement sur la branche principale
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            # Tags pour les PRs
            type=ref,event=pr
      
      # Étape 5: Lire les variables depuis le fichier .env
      - name: 📄 Load environment variables
        id: env
        run: |
          # Fonction pour extraire une variable d'un fichier .env
          extract_env_var() {
            local var_name=$1
            local file_path=$2
            if [ -f "$file_path" ]; then
              # Extraire la variable (ignorer les commentaires, gérer les espaces, guillemets, etc.)
              grep -E "^${var_name}=" "$file_path" | sed -E "s/^${var_name}=['\"]?([^'\"]*)['\"]?$/\1/" | head -1 | xargs || echo ""
            else
              echo ""
            fi
          }
          
          # Lire les variables depuis setup-front/.env si le fichier existe
          if [ -f "setup-front/.env" ]; then
            echo "✅ Fichier .env trouvé, lecture des variables..."
            
            # Extraire les variables EmailJS
            VITE_EMAILJS_PUBLIC_KEY=$(extract_env_var "VITE_EMAILJS_PUBLIC_KEY" "setup-front/.env")
            VITE_EMAILJS_SERVICE_ID=$(extract_env_var "VITE_EMAILJS_SERVICE_ID" "setup-front/.env")
            VITE_EMAILJS_CONTACT_TEMPLATE_ID=$(extract_env_var "VITE_EMAILJS_CONTACT_TEMPLATE_ID" "setup-front/.env")
            VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=$(extract_env_var "VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID" "setup-front/.env")
            
            # Afficher les variables (masquer les valeurs sensibles)
            if [ -n "$VITE_EMAILJS_PUBLIC_KEY" ]; then
              echo "VITE_EMAILJS_PUBLIC_KEY=${VITE_EMAILJS_PUBLIC_KEY:0:10}..."
            else
              echo "VITE_EMAILJS_PUBLIC_KEY=(vide)"
            fi
            if [ -n "$VITE_EMAILJS_SERVICE_ID" ]; then
              echo "VITE_EMAILJS_SERVICE_ID=${VITE_EMAILJS_SERVICE_ID:0:10}..."
            else
              echo "VITE_EMAILJS_SERVICE_ID=(vide)"
            fi
            if [ -n "$VITE_EMAILJS_CONTACT_TEMPLATE_ID" ]; then
              echo "VITE_EMAILJS_CONTACT_TEMPLATE_ID=${VITE_EMAILJS_CONTACT_TEMPLATE_ID:0:10}..."
            else
              echo "VITE_EMAILJS_CONTACT_TEMPLATE_ID=(vide)"
            fi
            if [ -n "$VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID" ]; then
              echo "VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=${VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID:0:10}..."
            else
              echo "VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=(vide)"
            fi
            
            # Exporter pour les prochaines étapes
            echo "VITE_EMAILJS_PUBLIC_KEY=${VITE_EMAILJS_PUBLIC_KEY}" >> $GITHUB_ENV
            echo "VITE_EMAILJS_SERVICE_ID=${VITE_EMAILJS_SERVICE_ID}" >> $GITHUB_ENV
            echo "VITE_EMAILJS_CONTACT_TEMPLATE_ID=${VITE_EMAILJS_CONTACT_TEMPLATE_ID}" >> $GITHUB_ENV
            echo "VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=${VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID}" >> $GITHUB_ENV
          else
            echo "⚠️ Fichier setup-front/.env non trouvé, utilisation de valeurs vides"
            echo "VITE_EMAILJS_PUBLIC_KEY=" >> $GITHUB_ENV
            echo "VITE_EMAILJS_SERVICE_ID=" >> $GITHUB_ENV
            echo "VITE_EMAILJS_CONTACT_TEMPLATE_ID=" >> $GITHUB_ENV
            echo "VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=" >> $GITHUB_ENV
          fi
      
      # Étape 6: Build Docker Image (le contexte "." existe maintenant)
      - name: 🔨 Build Docker Image
        run: |
          # Corriger le bug buildx "activity is a directory"
          # (buildx crée parfois un dossier au lieu d'un fichier après login/metadata)
          if [ -d "$HOME/.docker/buildx/activity" ]; then
            rm -rf "$HOME/.docker/buildx/activity"
            printf '%s' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > "$HOME/.docker/buildx/activity"
            echo "✅ Corrigé: buildx/activity (dossier → fichier avec timestamp)"
          elif [ -f "$HOME/.docker/buildx/activity" ] && [ ! -s "$HOME/.docker/buildx/activity" ]; then
            printf '%s' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > "$HOME/.docker/buildx/activity"
            echo "✅ Corrigé: buildx/activity (fichier vide → timestamp)"
          fi
          
          # Vérifier que le login fonctionne
          echo "Vérification de l'authentification DockerHub..."
          docker info | grep -i "username" || echo "⚠️ Pas de username dans docker info (peut être normal)"
          
          # Préparer les tags
          TAGS="${{ steps.meta.outputs.tags }}"
          if [ -z "$TAGS" ]; then
            # Fallback si metadata-action ne fonctionne pas
            TAGS="${{ env.DOCKER_IMAGE }}:latest ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          fi
          
          # Construire les arguments --tag en filtrant les tags invalides
          TAG_ARGS=""
          for tag in $TAGS; do
            # Vérifier que le tag est valide (non vide, ne commence pas par un tiret, format valide)
            if [ -n "$tag" ] && [ "${tag#-}" = "$tag" ] && echo "$tag" | grep -qE '^[^:]+:[^:]+$'; then
              TAG_ARGS="$TAG_ARGS --tag $tag"
              echo "✅ Tag valide ajouté: $tag"
            else
              echo "⚠️ Tag invalide ignoré: $tag"
            fi
          done
          
          # Vérifier qu'au moins un tag valide a été ajouté
          if [ -z "$TAG_ARGS" ]; then
            echo "❌ Aucun tag valide trouvé, utilisation du tag par défaut"
            TAG_ARGS="--tag ${{ env.DOCKER_IMAGE }}:latest"
          fi
          
          # Construire l'image (le contexte "." devrait maintenant exister)
          # Utiliser --pull pour forcer le pull des images de base avec authentification
          docker build \
            --pull \
            --file ${{ env.DOCKERFILE_PATH }} \
            $TAG_ARGS \
            --build-arg VITE_EMAILJS_PUBLIC_KEY="${VITE_EMAILJS_PUBLIC_KEY}" \
            --build-arg VITE_EMAILJS_SERVICE_ID="${VITE_EMAILJS_SERVICE_ID}" \
            --build-arg VITE_EMAILJS_CONTACT_TEMPLATE_ID="${VITE_EMAILJS_CONTACT_TEMPLATE_ID}" \
            --build-arg VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID="${VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID}" \
            --build-arg VITE_APP_NAME="KOBE Corporation" \
            --build-arg VITE_APP_URL="https://kobecorporation.com" \
            ${{ env.DOCKER_CONTEXT }}
          
          # Push l'image si ce n'est pas une PR
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            for tag in $TAGS; do
              # Vérifier que le tag est valide avant de push
              if [ -n "$tag" ] && [ "${tag#-}" = "$tag" ] && echo "$tag" | grep -qE '^[^:]+:[^:]+$'; then
                echo "Pushing $tag..."
                docker push "$tag" || echo "⚠️ Erreur lors du push de $tag"
              else
                echo "⚠️ Tag invalide ignoré lors du push: $tag"
              fi
            done
          fi
      
      # Étape 7: Afficher les informations de l'image
      - name: 📊 Image Info
        if: success()
        run: |
          echo "✅ Image buildée avec succès!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}"
          echo "🏷️  Tags: ${{ steps.meta.outputs.tags }}"
          docker images | grep "${{ env.DOCKER_IMAGE }}"
  
  # ==========================================
  # JOB 3: Test Docker Image (optionnel pour l'instant)
  # ==========================================
  test:
    name: 🧪 Test Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && needs.build.result == 'success'
    
    steps:
      # Étape 1: Checkout
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # Étape 2: Nettoyer et recréer les contextes Docker correctement
      - name: 🧹 Setup Docker Properly
        run: |
          # Supprimer buildx et contextes corrompus
          rm -rf ~/.docker/buildx 2>/dev/null || true
          rm -rf ~/.docker/contexts 2>/dev/null || true
          
          # Recréer buildx/activity comme FICHIER avec un timestamp valide
          # (buildx attend un RFC3339 dans ce fichier, pas un fichier vide ni un dossier)
          mkdir -p ~/.docker/buildx
          printf '%s' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > ~/.docker/buildx/activity
          
          # Recréer la structure de contextes correctement
          mkdir -p ~/.docker/contexts/meta
          
          # Créer le répertoire pour le contexte "." (hash de l'erreur)
          CONTEXT_DIR=~/.docker/contexts/meta/cdb4ee2aea69cc6a83331bbe96dc2caa9a299d21329efb0336fc02a82e1839a8
          mkdir -p "$CONTEXT_DIR"
          
          # Créer le fichier meta.json pour le contexte "."
          cat > "$CONTEXT_DIR/meta.json" <<'EOF'
          {
            "Name": ".",
            "Metadata": {
              "Description": "Default context"
            },
            "Endpoints": {
              "docker": {
                "Host": "unix:///var/run/docker.sock",
                "SkipTLSVerify": false
              }
            }
          }
          EOF
          
          # Vérifier que le fichier a été créé
          if [ -f "$CONTEXT_DIR/meta.json" ]; then
            echo "✅ Contexte Docker '.' créé avec succès"
          else
            echo "❌ Erreur: Impossible de créer le contexte"
            exit 1
          fi
      
      # Étape 3: Login à DockerHub
      - name: 🔐 Login to DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          echo "✅ Login DockerHub réussi"
      
      # Étape 4: Pull l'image buildée
      - name: 🐳 Pull Docker Image
        run: |
          docker pull ${{ env.DOCKER_IMAGE }}:latest || echo "Image not found, will build locally"
      
      # Étape 5: Test basique (vérifier que le conteneur démarre)
      - name: ✅ Test Container Start
        run: |
          docker run -d --name test-container -p 8080:80 ${{ env.DOCKER_IMAGE }}:latest || docker run -d --name test-container -p 8080:80 ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080 || exit 1
          echo "✅ Container started successfully!"
          docker stop test-container
          docker rm test-container

  # ==========================================
  # JOB 4: Deploy to VPS
  # ==========================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.build.result == 'success' && needs.test.result == 'success'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      
      - name: 🔍 Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "echo '✅ Connexion SSH réussie'"
      
      - name: 🐳 Check & Setup Docker on Server
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'DOCKER_SETUP'
          set -e
          
          echo "🔍 Vérification de Docker..."
          
          # Détecter la distribution
          if [ -f /etc/os-release ]; then
            . /etc/os-release
            OS=$ID
          else
            OS="unknown"
          fi
          
          # Vérifier si Docker est installé
          if ! command -v docker &> /dev/null; then
            echo "⚠️ Docker n'est pas installé, installation en cours..."
            
            if [ "$OS" = "unknown" ]; then
              echo "❌ Impossible de détecter la distribution"
              exit 1
            fi
            
            if [ "$OS" = "ubuntu" ] || [ "$OS" = "debian" ]; then
              echo "📦 Installation Docker pour Ubuntu/Debian..."
              sudo apt-get update -qq
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/$OS/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/$OS $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -qq
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
            elif [ "$OS" = "centos" ] || [ "$OS" = "rhel" ] || [ "$OS" = "fedora" ]; then
              echo "📦 Installation Docker pour CentOS/RHEL/Fedora..."
              sudo yum install -y yum-utils
              sudo yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
              sudo yum install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
            else
              echo "❌ Distribution non supportée: $OS"
              exit 1
            fi
          else
            echo "✅ Docker est déjà installé"
            docker --version
          fi
          
          # Vérifier Docker Compose
          if ! command -v docker-compose &> /dev/null && ! docker compose version &> /dev/null; then
            echo "⚠️ Docker Compose n'est pas installé, installation en cours..."
            if [ "$OS" = "ubuntu" ] || [ "$OS" = "debian" ]; then
              sudo apt-get install -y docker-compose-plugin
            elif [ "$OS" = "centos" ] || [ "$OS" = "rhel" ] || [ "$OS" = "fedora" ]; then
              sudo yum install -y docker-compose-plugin
            fi
          else
            echo "✅ Docker Compose est déjà installé"
            docker-compose --version 2>/dev/null || docker compose version
          fi
          
          # Vérifier le service Docker
          if ! sudo systemctl is-active --quiet docker 2>/dev/null; then
            echo "⚠️ Le service Docker n'est pas démarré, démarrage en cours..."
            sudo systemctl start docker
            sudo systemctl enable docker
          else
            echo "✅ Le service Docker est démarré"
          fi
          
          # Vérifier que l'utilisateur peut utiliser Docker
          if ! docker ps &> /dev/null; then
            echo "⚠️ L'utilisateur ne peut pas utiliser Docker sans sudo, ajout au groupe docker..."
            CURRENT_USER=$(whoami)
            sudo usermod -aG docker "$CURRENT_USER"
            echo "✅ Utilisateur $CURRENT_USER ajouté au groupe docker"
          else
            echo "✅ L'utilisateur peut utiliser Docker"
          fi
          
          # Test final
          echo "🧪 Test final de Docker..."
          if docker ps &> /dev/null; then
            docker ps
            echo "✅ Docker est prêt et fonctionne sans sudo!"
          elif sudo docker ps &> /dev/null; then
            sudo docker ps
            echo "✅ Docker est prêt (utilise sudo pour l'instant)"
          else
            echo "❌ Erreur: Docker ne fonctionne pas"
            exit 1
          fi
          DOCKER_SETUP
      
      - name: 📦 Prepare deployment files
        run: |
          mkdir -p .deploy
          
          cp -r setup-front .deploy/
          cp package.json .deploy/
          cp package-lock.json .deploy/ 2>/dev/null || echo "package-lock.json non trouvé, ignoré"
          cp index.html .deploy/ 2>/dev/null || echo "index.html non trouvé"
          cp vite.config.ts .deploy/ 2>/dev/null || echo "vite.config.ts non trouvé"
          cp tsconfig.json .deploy/ 2>/dev/null || echo "tsconfig.json non trouvé"
          cp tsconfig.app.json .deploy/ 2>/dev/null || echo "tsconfig.app.json non trouvé"
          cp tsconfig.node.json .deploy/ 2>/dev/null || echo "tsconfig.node.json non trouvé"
          cp tailwind.config.js .deploy/ 2>/dev/null || echo "tailwind.config.js non trouvé"
          cp postcss.config.js .deploy/ 2>/dev/null || echo "postcss.config.js non trouvé"
          cp eslint.config.js .deploy/ 2>/dev/null || echo "eslint.config.js non trouvé"
          
          # Copier le fichier .env s'il existe (important pour le domaine et les variables)
          if [ -f "setup-front/.env" ]; then
            cp setup-front/.env .deploy/setup-front/.env
            echo "✅ Fichier .env copié (contient le domaine et les variables)"
          else
            echo "⚠️ Fichier setup-front/.env non trouvé"
            echo "📝 Création d'un .env minimal avec le domaine..."
            printf '%s\n' \
              '# Domaine principal' \
              'DOMAIN=kobecorporation.com' \
              'VITE_APP_URL=https://kobecorporation.com' \
              'VITE_APP_NAME=KOBE Corporation' \
              '' \
              '# Variables EmailJS (à remplir)' \
              'VITE_EMAILJS_PUBLIC_KEY=' \
              'VITE_EMAILJS_SERVICE_ID=' \
              'VITE_EMAILJS_CONTACT_TEMPLATE_ID=' \
              'VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=' > .deploy/setup-front/.env
            echo "✅ Fichier .env minimal créé avec le domaine kobecorporation.com"
          fi
          
          cp -r src .deploy/ 2>/dev/null || echo "src/ non trouvé"
          cp -r public .deploy/ 2>/dev/null || echo "public/ non trouvé"
          
          if [ ! -f ".deploy/setup-front/nginx.conf" ]; then
            echo "❌ Erreur: nginx.conf n'est pas dans .deploy/setup-front/"
            exit 1
          fi
          
          if [ ! -f ".deploy/setup-front/Dockerfile" ]; then
            echo "❌ Erreur: Dockerfile n'est pas dans .deploy/setup-front/"
            exit 1
          fi
          
          # Vérifier que le .env contient le domaine
          if [ -f ".deploy/setup-front/.env" ]; then
            if grep -q "kobecorporation.com" .deploy/setup-front/.env; then
              echo "✅ Le domaine kobecorporation.com est présent dans .env"
            else
              echo "⚠️ Le domaine kobecorporation.com n'est pas dans .env, ajout..."
              echo "" >> .deploy/setup-front/.env
              echo "DOMAIN=kobecorporation.com" >> .deploy/setup-front/.env
              echo "VITE_APP_URL=https://kobecorporation.com" >> .deploy/setup-front/.env
            fi
          fi
          
          echo "✅ Fichiers de déploiement préparés"
      
      - name: 🔧 Configure SSH
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config << EOF
          Host vps-deploy
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USERNAME }}
            Port ${{ secrets.VPS_PORT || 22 }}
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            ServerAliveInterval 30
            ServerAliveCountMax 60
            TCPKeepAlive yes
            ConnectionAttempts 3
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: 🧹 Clean old deployment files
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config << EOF
          Host vps-deploy
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USERNAME }}
            Port ${{ secrets.VPS_PORT || 22 }}
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            ServerAliveInterval 30
            ServerAliveCountMax 60
            TCPKeepAlive yes
            ConnectionAttempts 3
          EOF
          chmod 600 ~/.ssh/config
          
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -F ~/.ssh/config vps-deploy << 'EOF'
            set -e
            
            echo "🧹 Nettoyage des anciens fichiers de déploiement..."
            
            # Arrêter et supprimer les anciens conteneurs
            if docker ps -a --format '{{.Names}}' | grep -q "kobecorporation-web"; then
              echo "🛑 Arrêt des anciens conteneurs..."
              docker stop kobecorporation-web 2>/dev/null || true
              docker rm kobecorporation-web 2>/dev/null || true
            fi
            
            # Supprimer les anciens dossiers
            if [ -d "/opt/kobe-corporation" ]; then
              echo "🗑️ Suppression de l'ancien répertoire /opt/kobe-corporation..."
              sudo rm -rf /opt/kobe-corporation || true
            fi
            
            # Créer la structure de dossiers
            echo "📁 Création de la structure de dossiers..."
            mkdir -p ~/kobe-corporation/setup-front
            
            echo "✅ Nettoyage terminé"
          EOF
      
      - name: 📤 Copy files to VPS
        run: |
          echo "📤 Copie des fichiers vers le serveur..."
          
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts 2>/dev/null || true
          
          # Copier setup-front/ (inclut .env, nginx.conf, compose.yaml)
          rsync -avz --delete \
            --include="nginx.conf" \
            --include=".env" \
            --include="compose.yaml" \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -p ${{ secrets.VPS_PORT || 22 }}" \
            .deploy/setup-front/ \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:~/kobe-corporation/setup-front/
          
          # Copier les fichiers à la racine
          echo "📦 Copie des fichiers de build à la racine..."
          
          if [ -f ".deploy/package.json" ]; then
            rsync -avz \
              -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -p ${{ secrets.VPS_PORT || 22 }}" \
              .deploy/package.json \
              ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:~/kobe-corporation/
          else
            echo "❌ Erreur: package.json n'existe pas dans .deploy/"
            exit 1
          fi
          
          if [ -f ".deploy/package-lock.json" ]; then
            rsync -avz \
              -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -p ${{ secrets.VPS_PORT || 22 }}" \
              .deploy/package-lock.json \
              ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:~/kobe-corporation/
          fi
          
          for file in index.html vite.config.ts tsconfig.json tsconfig.app.json tsconfig.node.json tailwind.config.js postcss.config.js eslint.config.js; do
            if [ -f ".deploy/$file" ]; then
              rsync -avz \
                -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -p ${{ secrets.VPS_PORT || 22 }}" \
                .deploy/$file \
                ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:~/kobe-corporation/
            fi
          done
          
          if [ -d ".deploy/src" ]; then
            rsync -avz \
              -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -p ${{ secrets.VPS_PORT || 22 }}" \
              .deploy/src/ \
              ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:~/kobe-corporation/src/
          else
            echo "❌ Erreur: src/ n'existe pas dans .deploy/"
            exit 1
          fi
          
          if [ -d ".deploy/public" ]; then
            rsync -avz \
              -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -p ${{ secrets.VPS_PORT || 22 }}" \
              .deploy/public/ \
              ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:~/kobe-corporation/public/
          else
            echo "❌ Erreur: public/ n'existe pas dans .deploy/"
            exit 1
          fi
          
          echo "✅ Tous les fichiers ont été copiés vers le serveur"
          
          # Vérifier les fichiers
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'VERIFY_FILES'
          set -e
          
          DEPLOY_PATH="$HOME/kobe-corporation"
          
          echo "📋 Vérification de $DEPLOY_PATH/package.json:"
          if [ -f "$DEPLOY_PATH/package.json" ]; then
            echo "✅ package.json trouvé"
            ls -lh "$DEPLOY_PATH/package.json"
          else
            echo "❌ ERREUR: package.json n'est pas présent dans $DEPLOY_PATH"
            exit 1
          fi
          
          echo "📋 Vérification de $DEPLOY_PATH/src:"
          if [ -d "$DEPLOY_PATH/src" ]; then
            echo "✅ src/ trouvé"
          else
            echo "❌ ERREUR: src/ n'est pas présent dans $DEPLOY_PATH"
            exit 1
          fi
          
          echo "📋 Vérification de $DEPLOY_PATH/public:"
          if [ -d "$DEPLOY_PATH/public" ]; then
            echo "✅ public/ trouvé"
          else
            echo "❌ ERREUR: public/ n'est pas présent dans $DEPLOY_PATH"
            exit 1
          fi
          
          echo "📋 Vérification de $DEPLOY_PATH/setup-front/.env:"
          if [ -f "$DEPLOY_PATH/setup-front/.env" ]; then
            echo "✅ .env trouvé dans setup-front/"
            if grep -q "kobecorporation.com" "$DEPLOY_PATH/setup-front/.env"; then
              echo "✅ Le domaine kobecorporation.com est présent dans .env"
              grep -E "^DOMAIN=|^VITE_APP_URL=" "$DEPLOY_PATH/setup-front/.env" | head -2
            else
              echo "⚠️ Le domaine kobecorporation.com n'est pas dans .env, ajout..."
              echo "" >> "$DEPLOY_PATH/setup-front/.env"
              echo "DOMAIN=kobecorporation.com" >> "$DEPLOY_PATH/setup-front/.env"
              echo "VITE_APP_URL=https://kobecorporation.com" >> "$DEPLOY_PATH/setup-front/.env"
              echo "✅ Domaine ajouté au .env"
            fi
          else
            echo "⚠️ .env non trouvé, création avec le domaine..."
            printf '%s\n' \
              '# Domaine principal' \
              'DOMAIN=kobecorporation.com' \
              'VITE_APP_URL=https://kobecorporation.com' \
              'VITE_APP_NAME=KOBE Corporation' \
              '' \
              '# Variables EmailJS (à remplir)' \
              'VITE_EMAILJS_PUBLIC_KEY=' \
              'VITE_EMAILJS_SERVICE_ID=' \
              'VITE_EMAILJS_CONTACT_TEMPLATE_ID=' \
              'VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=' > "$DEPLOY_PATH/setup-front/.env"
            echo "✅ Fichier .env créé avec le domaine kobecorporation.com"
          fi
          
          echo "✅ Tous les fichiers nécessaires sont présents sur le serveur"
          VERIFY_FILES
      
      # Login Docker Hub sur le VPS (commande séparée pour passer les secrets)
      - name: 🔑 Docker Login on VPS
        timeout-minutes: 5
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config << EOF
          Host vps-deploy
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USERNAME }}
            Port ${{ secrets.VPS_PORT || 22 }}
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            ServerAliveInterval 30
            ServerAliveCountMax 60
            TCPKeepAlive yes
            ConnectionAttempts 3
          EOF
          chmod 600 ~/.ssh/config
          
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -F ~/.ssh/config vps-deploy \
            "echo '${{ secrets.DOCKERHUB_PASSWORD }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin"
      
      - name: 🐳 Deploy Docker Containers
        timeout-minutes: 30
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -F ~/.ssh/config vps-deploy << 'DEPLOY_DOCKER'
          set -e
          
          get_docker_cmd() {
            if docker ps &> /dev/null 2>&1; then
              echo "docker"
            else
              echo "sudo docker"
            fi
          }
          
          DOCKER_CMD=$(get_docker_cmd)
          
          get_compose_cmd() {
            if docker ps &> /dev/null 2>&1; then
              if command -v docker-compose &> /dev/null; then
                echo "docker-compose"
              else
                echo "docker compose"
              fi
            else
              if command -v docker-compose &> /dev/null; then
                echo "sudo docker-compose"
              else
                echo "sudo docker compose"
              fi
            fi
          }
          
          COMPOSE_CMD=$(get_compose_cmd)
          
          DEPLOY_PATH="$HOME/kobe-corporation"
          DOCKER_COMPOSE_PATH="$DEPLOY_PATH/setup-front"
          
          echo "🌐 Vérification/création du réseau Docker kobecorp-network..."
          if ! $DOCKER_CMD network ls | grep -q "kobecorp-network"; then
            echo "📦 Création du réseau kobecorp-network..."
            $DOCKER_CMD network create kobecorp-network || {
              echo "⚠️ Le réseau existe peut-être déjà, vérification..."
              if $DOCKER_CMD network inspect kobecorp-network &>/dev/null; then
                echo "✅ Le réseau kobecorp-network existe déjà"
              else
                echo "❌ Erreur: Impossible de créer ou vérifier le réseau"
                exit 1
              fi
            }
          else
            echo "✅ Le réseau kobecorp-network existe déjà"
          fi
          
          cd "$DOCKER_COMPOSE_PATH"
          
          if [ ! -f "compose.yaml" ]; then
            echo "❌ Erreur: compose.yaml n'est pas présent dans $DOCKER_COMPOSE_PATH"
            exit 1
          fi
          
          echo ""
          echo "📥 Pull de l'image pré-construite depuis Docker Hub..."
          $COMPOSE_CMD -f compose.yaml pull
          
          echo "🚀 Démarrage des conteneurs..."
          $COMPOSE_CMD -f compose.yaml up -d --force-recreate

          echo "⏳ Attente du démarrage des conteneurs..."
          sleep 10

          echo "📊 Statut des conteneurs:"
          $COMPOSE_CMD -f compose.yaml ps

          if $COMPOSE_CMD -f compose.yaml ps | grep -q "Up"; then
            echo "✅ Conteneurs démarrés avec succès!"
          else
            echo "❌ Erreur: Les conteneurs ne sont pas démarrés"
            $COMPOSE_CMD -f compose.yaml logs
            exit 1
          fi

          echo "📋 Logs récents:"
          if echo "$COMPOSE_CMD" | grep -q "docker compose"; then
            $COMPOSE_CMD -f compose.yaml logs --tail=50
          else
            $COMPOSE_CMD -f compose.yaml logs --tail=50
          fi
          DEPLOY_DOCKER

      - name: ✅ Verify deployment
        run: |
          echo "✅ Vérification du déploiement..."
          
          mkdir -p ~/.ssh
          cat > ~/.ssh/config << EOF
          Host vps-deploy
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USERNAME }}
            Port ${{ secrets.VPS_PORT || 22 }}
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            ServerAliveInterval 30
            ServerAliveCountMax 60
            TCPKeepAlive yes
            ConnectionAttempts 3
          EOF
          chmod 600 ~/.ssh/config
          
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes -F ~/.ssh/config vps-deploy << 'VERIFY'
          set -e
          
          get_docker_cmd() {
            if docker ps &> /dev/null 2>&1; then
              echo "docker"
            else
              echo "sudo docker"
            fi
          }
          
          DOCKER_CMD=$(get_docker_cmd)
          
          get_compose_cmd() {
            if docker ps &> /dev/null 2>&1; then
              if command -v docker-compose &> /dev/null; then
                echo "docker-compose"
              else
                echo "docker compose"
              fi
            else
              if command -v docker-compose &> /dev/null; then
                echo "sudo docker-compose"
              else
                echo "sudo docker compose"
              fi
            fi
          }
          
          COMPOSE_CMD=$(get_compose_cmd)
          
          DEPLOY_PATH="$HOME/kobe-corporation"
          DOCKER_COMPOSE_PATH="$DEPLOY_PATH/setup-front"
          
          cd "$DOCKER_COMPOSE_PATH"
          
          if $COMPOSE_CMD ps | grep -q "Up"; then
            echo "✅ Déploiement réussi! Le conteneur est en cours d'exécution."
            
            echo ""
            echo "📊 Informations du conteneur:"
            $DOCKER_CMD ps --filter "name=kobecorporation-web" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            echo ""
            echo "🌐 Vérification du réseau Docker..."
            if $DOCKER_CMD inspect kobecorporation-web --format '{{range $key, $value := .NetworkSettings.Networks}}{{$key}}{{end}}' | grep -q "kobecorp-network"; then
              echo "✅ Le conteneur est sur le réseau kobecorp-network"
            else
              echo "⚠️ Le conteneur n'est pas sur le réseau kobecorp-network"
            fi
            
            CONTAINER_IP=$($DOCKER_CMD inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' kobecorporation-web 2>/dev/null || echo "")
            if [ -n "$CONTAINER_IP" ]; then
              echo ""
              echo "🌐 IP du conteneur: $CONTAINER_IP"
              echo "🔍 Test de connectivité..."
              curl -f http://localhost:80 > /dev/null 2>&1 && echo "✅ L'application répond sur le port 80" || echo "⚠️ L'application ne répond pas encore (peut être normal si elle démarre)"
            fi
          else
            echo "❌ Erreur: Le conteneur n'est pas en cours d'exécution"
            $COMPOSE_CMD ps
            $COMPOSE_CMD logs --tail=100
            exit 1
          fi
          VERIFY
      
      - name: 🎉 Deployment Summary
        if: success()
        run: |
          echo ""
          echo "🎉 =========================================="
          echo "🎉 DÉPLOIEMENT RÉUSSI!"
          echo "🎉 =========================================="
          echo ""
          echo "📦 Image Docker: ${{ env.DOCKER_IMAGE }}:latest"
          echo "🌐 Serveur: ${{ secrets.VPS_HOST }}"
          echo "📁 Chemin de déploiement: ~/kobe-corporation/setup-front"
          echo "🐳 Conteneur: kobecorporation-web"
          echo "🌐 Réseau Docker: kobecorp-network"
          echo "🔌 Port interne: 80"
          echo ""
          echo "✅ L'application est maintenant déployée et accessible!"
          echo "📝 Note: Le proxy Nginx doit être configuré pour utiliser kobecorporation-web:80"
          echo ""

  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [tags, build]
    if: |
      github.event_name != 'pull_request' && 
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.tags.outputs.tag_created == 'true' &&
      needs.build.result == 'success'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔍 Verify Tag Exists
        run: |
          TAG_NAME="${{ needs.tags.outputs.tag_name }}"
          echo "🔍 Vérification que le tag $TAG_NAME existe sur le dépôt distant..."
          
          # Récupérer les tags du dépôt distant
          git fetch --tags
          
          # Vérifier que le tag existe
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "✅ Tag $TAG_NAME trouvé localement"
          else
            echo "⚠️ Tag $TAG_NAME non trouvé localement, tentative de récupération..."
            git fetch origin tag "$TAG_NAME" || {
              echo "❌ Erreur: Le tag $TAG_NAME n'existe pas sur le dépôt distant"
              echo "ℹ️ Le tag doit être poussé avant de créer la release"
              exit 1
            }
          fi
          
          # Afficher les informations du tag
          echo "📋 Informations du tag:"
          git show "$TAG_NAME" --no-patch --format="  SHA: %H%n  Auteur: %an%n  Date: %ad" || echo "  Impossible d'afficher les informations"
      
      - name: 📋 Generate Release Notes
        id: release_notes
        run: |
          TAG_NAME="${{ needs.tags.outputs.tag_name }}"
          VERSION="${{ needs.tags.outputs.semantic_version }}"
          TAG_TYPE="${{ needs.tags.outputs.tag_type }}"
          IS_RELEASE="${{ needs.tags.outputs.is_release }}"
          
          # Déterminer si c'est une release sémantique ou un tag de développement
          if [ "$IS_RELEASE" = "true" ] && [ -n "$VERSION" ]; then
            RELEASE_TYPE="🎉 Release Sémantique"
            IS_PRERELEASE="false"
            # Récupérer les commits depuis le dernier tag sémantique
            LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              echo "📝 Génération des notes depuis le tag $LAST_TAG"
              COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
            else
              echo "📝 Premier tag sémantique, récupération des 10 derniers commits"
              COMMITS=$(git log -10 --pretty=format:"- %s (%h)" --no-merges)
            fi
          else
            RELEASE_TYPE="🔧 Release de Développement"
            IS_PRERELEASE="true"
            # Pour les tags de développement, récupérer les 10 derniers commits
            echo "📝 Tag de développement, récupération des 10 derniers commits"
            COMMITS=$(git log -10 --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Créer le body de la release en écrivant directement dans le fichier
          {
            if [ "$IS_RELEASE" = "true" ] && [ -n "$VERSION" ]; then
              echo "## $RELEASE_TYPE"
              echo ""
              echo "**Version:** $VERSION"
              echo "**Tag:** $TAG_NAME"
              echo "**Type:** $TAG_TYPE"
              echo ""
              echo "### 📦 Image Docker"
              echo "L'image Docker est disponible sur Docker Hub :"
              echo "\`\`\`"
              echo "docker pull ${{ env.DOCKER_IMAGE }}:$TAG_NAME"
              echo "docker pull ${{ env.DOCKER_IMAGE }}:latest"
              echo "\`\`\`"
            else
              echo "## $RELEASE_TYPE"
              echo ""
              echo "**Tag:** $TAG_NAME"
              echo "**Type:** $TAG_TYPE"
              echo ""
              echo "⚠️ **Note:** Ceci est une release de développement. Pour une release de production, mettez à jour la version dans \`package.json\`."
              echo ""
              echo "### 📦 Image Docker"
              echo "L'image Docker est disponible sur Docker Hub :"
              echo "\`\`\`"
              echo "docker pull ${{ env.DOCKER_IMAGE }}:$TAG_NAME"
              echo "\`\`\`"
            fi
            echo ""
            echo "### 📝 Changements"
            echo "$COMMITS"
            echo ""
            echo "### 🔗 Liens"
            echo "- **Docker Hub:** https://hub.docker.com/r/${{ env.DOCKER_IMAGE }}"
            echo "- **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
            echo ""
            echo "---"
            echo "*Généré automatiquement par GitHub Actions*"
          } > release_notes.md
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "✅ Notes de release générées (Prerelease: $IS_PRERELEASE)"
          
          # Afficher un aperçu
          echo "📄 Aperçu des notes de release:"
          head -20 release_notes.md
      
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.tags.outputs.tag_name }}
          name: Release ${{ needs.tags.outputs.tag_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ steps.release_notes.outputs.is_prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false
